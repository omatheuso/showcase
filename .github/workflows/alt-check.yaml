name: Alt Text Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  alt-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-libvips-${{ runner.os }}-${{ hashFiles('.github/workflows/alt-check.yml') }}
          restore-keys: apt-libvips-${{ runner.os }}-

      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17"
          otp-version: "26"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ hashFiles('mix.lock') }}

      - name: Cache BLIP model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/bumblebee
          key: bumblebee-blip-${{ hashFiles('mix.lock') }}
          restore-keys: bumblebee-blip-

      - name: Install deps
        run: mix deps.get

      - name: Check image alt text
        run: mix fast_alt.scan priv/static/demo
